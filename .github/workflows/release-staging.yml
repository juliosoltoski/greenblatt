name: Release Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: Deploy the freshly built images to the staging host.
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.image-vars.outputs.backend_image }}
      frontend_image: ${{ steps.image-vars.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image-vars
        name: Compute image tags
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=ghcr.io/${owner}/greenblatt-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_staging=ghcr.io/${owner}/greenblatt-backend:staging" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/${owner}/greenblatt-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_staging=ghcr.io/${owner}/greenblatt-frontend:staging" >> "$GITHUB_OUTPUT"
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image-vars.outputs.backend_image }}
            ${{ steps.image-vars.outputs.backend_staging }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image-vars.outputs.frontend_image }}
            ${{ steps.image-vars.outputs.frontend_staging }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: >-
      ${{
        (github.event_name == 'push' || inputs.deploy_staging == true) &&
        secrets.STAGING_SSH_HOST != '' &&
        secrets.STAGING_SSH_USER != '' &&
        secrets.STAGING_SSH_KEY != '' &&
        secrets.STAGING_APP_PATH != ''
      }}
    steps:
      - name: Deploy staging host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.STAGING_APP_PATH }}"
            env_file="${{ secrets.STAGING_ENV_FILE_PATH }}"
            if [ -z "$env_file" ]; then
              env_file=".env.staging"
            fi
            export ENV_FILE="$env_file"
            export BACKEND_IMAGE="${{ needs.build-and-push.outputs.backend_image }}"
            export FRONTEND_IMAGE="${{ needs.build-and-push.outputs.frontend_image }}"
            ./infra/scripts/deploy_staging.sh
