services:
  postgres:
    ports: []
    restart: unless-stopped

  redis:
    ports: []
    restart: unless-stopped

  minio:
    ports: []
    restart: unless-stopped

  backend:
    pull_policy: always
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://localhost}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-true}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-true}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-true}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-true}
      DJANGO_CACHE_BACKEND: ${DJANGO_CACHE_BACKEND:-redis}
      DJANGO_CACHE_LOCATION: ${DJANGO_CACHE_LOCATION:-redis://redis:6379/2}
      DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-300}
      DRF_THROTTLE_BURST: ${DRF_THROTTLE_BURST:-240/min}
      DRF_THROTTLE_ANON: ${DRF_THROTTLE_ANON:-120/min}
      DRF_THROTTLE_LOGIN: ${DRF_THROTTLE_LOGIN:-20/min}
      DRF_THROTTLE_LAUNCH: ${DRF_THROTTLE_LAUNCH:-60/hour}
      DRF_THROTTLE_EXPORT: ${DRF_THROTTLE_EXPORT:-120/hour}
      WORKSPACE_MAX_CONCURRENT_JOBS: ${WORKSPACE_MAX_CONCURRENT_JOBS:-8}
      WORKSPACE_MAX_CONCURRENT_RESEARCH_JOBS: ${WORKSPACE_MAX_CONCURRENT_RESEARCH_JOBS:-2}
      WORKSPACE_MAX_CONCURRENT_SMOKE_JOBS: ${WORKSPACE_MAX_CONCURRENT_SMOKE_JOBS:-2}
      DJANGO_ADMINS: ${DJANGO_ADMINS:-}
      SERVER_EMAIL: ${SERVER_EMAIL:-greenblatt@example.test}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:-}

  worker:
    pull_policy: always
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CACHE_BACKEND: ${DJANGO_CACHE_BACKEND:-redis}
      DJANGO_CACHE_LOCATION: ${DJANGO_CACHE_LOCATION:-redis://redis:6379/2}
      DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-300}
      WORKSPACE_MAX_CONCURRENT_JOBS: ${WORKSPACE_MAX_CONCURRENT_JOBS:-8}
      WORKSPACE_MAX_CONCURRENT_RESEARCH_JOBS: ${WORKSPACE_MAX_CONCURRENT_RESEARCH_JOBS:-2}
      WORKSPACE_MAX_CONCURRENT_SMOKE_JOBS: ${WORKSPACE_MAX_CONCURRENT_SMOKE_JOBS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}

  beat:
    pull_policy: always
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CACHE_BACKEND: ${DJANGO_CACHE_BACKEND:-redis}
      DJANGO_CACHE_LOCATION: ${DJANGO_CACHE_LOCATION:-redis://redis:6379/2}
      DATABASE_CONN_MAX_AGE: ${DATABASE_CONN_MAX_AGE:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-staging}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0}
      SENTRY_SEND_DEFAULT_PII: ${SENTRY_SEND_DEFAULT_PII:-false}

  frontend:
    pull_policy: always
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Greenblatt Web App}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/api}

  proxy:
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-80}:80"
